# Example nginx reverse proxy for the favicon & logo generator.
# Next.js runs on 127.0.0.1:3000 (see ecosystem.config.js); nginx terminates
# HTTP(S) and forwards to it.
#
# Setup:
#   1. Edit `server_name` below to your domain.
#   2. cp deploy/nginx.conf /etc/nginx/sites-available/favicon-generator
#   3. ln -s /etc/nginx/sites-available/favicon-generator /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#   5. (optional) HTTPS: certbot --nginx -d your-domain.com

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;   # ← change to your domain

    # Bulk export POSTs base64 master images — raise the body limit (default is 1M).
    client_max_body_size 100M;

    # Serve Next's built static assets straight from disk (faster, skips Node).
    location /_next/static/ {
        alias /var/www/favicon-generator/.next/static/;
        expires 365d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large ZIP generation can take a while for big batches.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Optional: password-protect the whole app with HTTP Basic Auth.
    # Create the password file first:
    #   printf "USER:$(openssl passwd -apr1 'YOUR_PASSWORD')\n" > /etc/nginx/.htpasswd
    # then uncomment the two lines below inside `location /`:
    #   auth_basic "Restricted";
    #   auth_basic_user_file /etc/nginx/.htpasswd;
}
